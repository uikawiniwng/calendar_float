          body: `# 《幻沫与潮汐之恋：索伦蒂斯的起源》
> *——摘自索伦蒂斯王国官方旅游宣发手册，亦是银帆城吟游诗人传唱百年的经典篇章*

在索伦蒂斯这片璀璨的沿海大地上，曾笼罩着旧王国残暴统治的阴霾。那是一个人类至上、阶级森严的时代。陆地与深海仿佛是两个隔绝的世界，傲慢的人类对浩瀚的海洋知之甚少。在他们的认知里，海中只有那些生着鱼头人身、面目可憎且低智嗜血的怪物——“鱼人”。他们从未见过，也无法想象，在深海的珊瑚宫殿中，生活着优雅美丽、半人半鱼的“人鱼”一族。

命运让她与一位在暗夜中反抗暴政的人类义贼相遇。他们并肩作战，成为了旧王权的噩梦。当暴君的军队将他们逼入绝境时，被他们保护过的平民们自发戴上面具涌上街头，用成千上万个“假面”掩护了起义军的集结，最终推翻了旧王国。

昔日的义贼加冕为新王，那位一直陪伴他的面具少女，理应成为首任皇后。

然而，在建国庆典的第七日黎明，一场恶毒的危机悄然爆发。旧王国的残党在人群中散布了致命的谣言：*“新王的身边跟着一只深海的怪物！那张假面之下，隐藏着一张丑陋畸形的鱼人脸孔，她会用巫术吞噬我们的国家！”*

刚刚经历战乱、对海洋充满未知恐惧的民众陷入了巨大的恐慌。在加冕仪式的广场上，无数双充满猜疑、恐惧与愤怒的眼睛死死盯着王座上的少女。即使新王拔出长剑，甚至想要用自己的身躯去挡住那些如刀刃般的视线，拼命想要保护他的妻子，也无法平息那如海啸般涌动的猜忌。

于是，她做出了一个决绝的决定。

她轻轻按下新王持剑的手，给了他一个无畏而绝美的微笑。随后，她挣脱了国王的怀抱，独自走向高台边缘。在万众瞩目之下，她毅然决然地伸手，摘下了脸上的幻沫假面。

## 篇章一：起源 · 休战的安魂曲

> **“那不是一场选美，那是为了阻止一场内战而献上的最高规格的祭礼。”**

在复兴纪元初期，索伦蒂斯的“美”还不是一项全民狂欢。纪元214年，王国的三大财阀为了争夺诺斯加德联盟的远洋航线垄断权，彻底撕破了脸皮。

谈判破裂后，三大财阀的私军在银帆城港口重兵集结。上千艘战船的魔导炮早已充能完毕，只差一颗微不足道的火星，这座繁华到令人眩目的商业之都便会化为焦土。

就在第一发炮弹即将出膛的瞬间，奇迹降临了。

赛瑞利亚的主人——那位平日深居简出的原生种人鱼领主，**塞壬大人**——毫无征兆地浮现在港口中央的海面上。她没有带任何护卫，也没有动用任何攻击性魔法。面对数万名杀气腾腾的士兵，她只是轻轻叹了口气，然后唱起了一首古老而温柔的海妖之歌。

没有人能准确描述那一刻的感受。

那感觉像是狂暴的飓风被瞬间抽干了空气，沸腾的血液被灌入万年的冰泉。那极致的悲悯、包容与纯粹到近乎神性的艺术震撼，直接穿透了所有人的灵魂。

士兵们手中的刀剑无意识地滑落，舰长们忘记了下达开火的指令。三大财阀的掌权者站在旗舰甲板上，呆呆地望着海中央那个沐浴在月光下的银发身影。

在长达半个小时的歌声中，他们完全忘记了什么是航线，什么是利润，甚至忘记了自己为何站在那里。

当一曲终了，塞壬大人悄然沉入海底，留下的只有一片死寂的舰队。

**那场足以毁灭王国的内战，就这样消弭于无形。**

## 篇章二：阳谋 · 以和平之名的公费追星

内战虽然平息，但三大财阀却陷入了另一种“狂热”的病态。

在体会过那种直击灵魂的美之后，世间的财富与权力突然变得索然无味。他们发疯般渴望再次聆听那足以安抚灵魂的歌声，再次目睹那不可亵渎的容颜。

可塞壬大人行踪不定，绝不是用金币就能请来的存在。

于是，索伦蒂斯历史上最堂而皇之、也最厚颜无耻的**“阳谋”**诞生了。

三大财阀联合向深蓝议会提交了一份备忘录，声称：

> **“如果没有能够平息我们心中暴躁的最极致的‘美’，我们无法保证脆弱的和平能够继续维持。”**

他们以此为借口，倾尽财力，史无前例地举办了第一届**女神选美大赛**。

其实，谁都知道那些胭脂俗粉根本入不了他们的眼。这只不过是三大财阀联手设下的一个局——一个用整个王国的和平作为要挟，逼迫那位温柔的大家长现身的局。

**这是阿斯塔利亚大陆历史上，最昂贵、也最冠冕堂皇的一次“公费追星”。**

## 篇章三：传奇的落幕 · 至高的阿芙罗黛蒂

这个拙劣的政治要挟，精准地捏住了塞壬大人最大的软肋——

她实在太在意这个国家，也太在意这群“不听话的孩子们”了。

出于对内战重燃的深深担忧，塞壬大人无奈地走上了第一届舞台。毫无悬念，她以断层式优势拿下了桂冠。

而在接下来的三年里，三大财阀食髓知味。每年大赛前夕，他们都会疯狂制造摩擦、囤积军备，摆出一副：

> **“你不来，我们马上就打给你看。”**

的无赖姿态。

为了“大局”，塞壬大人只能连续四年出现在最终舞台上，用她的歌声安抚这群“暴躁”的野心家。

直到第五年。

也许是财阀们坐在最前排 VIP 包厢里听歌时，脸上那份抑制不住的狂热与享受实在太过明显；也许是那位看透世事的古神镇守者，终于识破了这场长达四年的“诡计”。

第五年，塞壬大人只轻飘飘地留下了一句话：

> **“大人的游戏该留给真正的小丫头们玩了。你们几个再敢拿开战当借口，我就亲自把你们的战船沉到海沟里去。”**

随后，她彻底拒绝参赛。

结果，没有看到塞壬大人的财阀与民众真的“暴动”了。为了平息这场几乎席卷全城的抗议，深蓝议会不得不紧急颁布法案，为她加冕全大陆唯一、永久的称号：

# 至高的阿芙罗黛蒂

从此，她被移出常规序列，成为悬在所有参赛者头顶的、不可逾越的神话。

而那三个厚颜无耻的财阀，直到今天仍坐在每年选美大赛的 VIP 席上，叹息着当年那段“美好的时光”。`,
        },
      ];

      const OFFICIAL_FESTIVALS = [
        {

          title: '幻沫假面祭',
          summary: '全民阶级消除与欲望释放的七日狂欢节。',
          startMonth: 5,
          startDay: 14,
          endMonth: 5,
          endDay: 20,
          relatedBooks: ['huanmo_origin_story'],
        },
        {
          id: 'deepblue_auction_summer',
          title: '深蓝拍卖会',
          summary: '大陆最高规格黑市拍卖，汇聚违禁品、稀有收藏与权贵暗盘交易。',
          startMonth: 6,
          startDay: 6,
          endMonth: 6,
          endDay: 6,
          relatedBooks: [],

          summary: '面向全大陆的世界级盛会，以海选、筹备巡游与终焉决赛层层筛出本年度“阿芙罗黛蒂”。',

          relatedBooks: [],

      ];

      function ensureDayEntry(month, day) {
        const key = String(day);
        if (!month.days[key]) {
          month.days[key] = { events: [] };
        }
        return month.days[key];
      }

      function applyOfficialPreviewData(months) {
        months.forEach(month => {
          month.books = OFFICIAL_BOOKS.map(book => ({ ...book }));
        });

        OFFICIAL_FESTIVALS.forEach(festival => {
          months.forEach(month => {
            const monthNumber = Number(month.id.split('-')[1]);
            if (monthNumber < festival.startMonth || monthNumber > festival.endMonth) {
              return;
            }

            const rangeStart = monthNumber === festival.startMonth ? festival.startDay : 1;
            const rangeEnd = monthNumber === festival.endMonth ? festival.endDay : month.daysInMonth;

            for (let day = rangeStart; day <= rangeEnd; day += 1) {
              const entry = ensureDayEntry(month, day);
              entry.events.push({
                id: `${festival.id}-${month.id}-${day}`,
                title: festival.title,
                kind: 'festival',
                time: '全天',
                description: festival.summary,
                tags: ['节庆'],
                relatedBooks: [...festival.relatedBooks],
              });
            }
          });
        });
      }

      const state = {
        viewport: 'desktop',
        view: 'month',
        panel: 'detail',
        currentMonthIndex: 2,
        selectedDay: 12,
        selectedEventId: 'm6-user-ggg',
        actionMenuEventId: null,
        readerBookId: null,
        formMode: 'create',
      };

      const months = JSON.parse(JSON.stringify(INITIAL_MONTHS));
      applyOfficialPreviewData(months);
      const app = document.getElementById('app');

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function getCurrentMonth() {
        return months[state.currentMonthIndex];
      }

      function getMonthByIndex(index) {
        return months[(index + months.length) % months.length];
      }

      function getDayData(month, day) {
        return month.days[String(day)] || { events: [] };
      }

      function getWeekdayLabel(month, day) {
        return WEEKDAYS[(month.startWeekday + day - 1) % 7];
      }

      function formatDayLabel(month, day) {
        return `${month.title.replace('年 ', '年')}${day}日 周${getWeekdayLabel(month, day)}`;
      }

      function buildCalendarCells(month) {
        const leading = month.startWeekday;
        const previousMonth = getMonthByIndex(state.currentMonthIndex - 1);
        const nextMonth = getMonthByIndex(state.currentMonthIndex + 1);
        const previousCells = Array.from({ length: leading }, (_, index) => ({
          day: previousMonth.daysInMonth - leading + index + 1,
          muted: true,
          monthOffset: -1,
          events: [],
        }));
        const currentCells = Array.from({ length: month.daysInMonth }, (_, index) => {
          const day = index + 1;
          return {
            day,
            muted: false,
            monthOffset: 0,
            events: getDayData(month, day).events,
          };
        });
        const used = previousCells.length + currentCells.length;
        const trailing = (7 - (used % 7 || 7)) % 7;
        const nextCells = Array.from({ length: trailing }, (_, index) => ({
          day: index + 1,
          muted: true,
          monthOffset: 1,
          events: [],
        }));
        return [...previousCells, ...currentCells, ...nextCells];
      }

      function getSelectedDayData() {
        return getDayData(getCurrentMonth(), state.selectedDay);
      }

      function getSelectedEvent() {
        return getSelectedDayData().events.find(event => event.id === state.selectedEventId) || null;
      }

      function getBookById(bookId) {
        for (const month of months) {
          const book = month.books.find(item => item.id === bookId);
          if (book) return book;
        }
        return null;
      }

      function collectDayBookIds(month, dayData) {
        const ids = new Set();
        dayData.events.forEach(event => {
          (event.relatedBooks || []).forEach(id => ids.add(id));
        });
        return Array.from(ids);
      }

      function selectDay(day) {
        const month = getCurrentMonth();
        if (day < 1 || day > month.daysInMonth) return;
        state.selectedDay = day;
        state.selectedEventId = getDayData(month, day).events[0]?.id || null;
        state.actionMenuEventId = null;
        state.panel = 'detail';
        state.formMode = 'create';
      }

      function selectEvent(day, eventId) {
        selectDay(day);
        state.selectedEventId = eventId;
        state.actionMenuEventId = eventId;
      }

      function jumpMonth(offset, preferredDay) {
        state.currentMonthIndex = (state.currentMonthIndex + offset + months.length) % months.length;
        const month = getCurrentMonth();
        const targetDay = preferredDay && preferredDay <= month.daysInMonth ? preferredDay : month.defaultDay;
        state.selectedDay = targetDay;
        state.selectedEventId = getDayData(month, targetDay).events[0]?.id || null;
        state.actionMenuEventId = null;
        state.panel = 'detail';
        state.readerBookId = null;
        state.formMode = 'create';
      }

      function resetCurrentMonth() {
        state.currentMonthIndex = 2;
        state.selectedDay = 12;
        state.selectedEventId = 'm6-user-ggg';
        state.actionMenuEventId = null;
        state.panel = 'detail';
        state.readerBookId = null;
        state.formMode = 'create';
      }

      function toggleArchive(day, eventId) {
        const dayData = getDayData(getCurrentMonth(), day);
        const target = dayData.events.find(event => event.id === eventId);
        if (!target) return;
        target.kind = target.kind === 'archive' ? 'user' : 'archive';
      }

      function deleteEvent(day, eventId) {
        const dayData = getDayData(getCurrentMonth(), day);
        const nextEvents = dayData.events.filter(event => event.id !== eventId);
        getCurrentMonth().days[String(day)] = { ...dayData, events: nextEvents };
        if (state.selectedEventId === eventId) {
          state.selectedEventId = nextEvents[0]?.id || null;
        }
        if (state.actionMenuEventId === eventId) {
          state.actionMenuEventId = null;
        }
        state.panel = 'detail';
      }

      function openCreateForm() {
        state.panel = 'form';
        state.formMode = 'create';
        state.actionMenuEventId = null;
      }

      function openEditForm(day, eventId) {
        selectEvent(day, eventId);
        state.panel = 'form';
        state.formMode = 'edit';
      }

      function renderActionButtons(day, event) {
        if (event.kind === 'festival') {
          return '';
        }

        const archiveLabel = event.kind === 'archive' ? '恢复' : '完成';
        return `
          <div class="btn-row">
            <button class="btn" data-action="edit-event" data-day="${day}" data-event-id="${escapeHtml(event.id)}" type="button">编辑</button>
            <button class="btn success" data-action="toggle-archive" data-day="${day}" data-event-id="${escapeHtml(event.id)}" type="button">${archiveLabel}</button>
            <button class="btn danger" data-action="delete-event" data-day="${day}" data-event-id="${escapeHtml(event.id)}" type="button">删除</button>
          </div>
        `;
      }

      function renderEventCard(day, event, compact = false) {
        const expanded = state.actionMenuEventId === event.id;
        const tags = (event.tags || []).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
        return `
          <article
            class="event-card ${event.kind === 'archive' ? 'archive-card' : ''} ${expanded ? 'expanded' : ''}"
            data-action="pick-event-card"
            data-day="${day}"
            data-event-id="${escapeHtml(event.id)}"
            tabindex="0"
          >
            <div class="event-card-head">
              <div class="section-title">${escapeHtml(event.title)}</div>
              <div class="event-card-time">${escapeHtml(event.time)}</div>
            </div>
            <div>${escapeHtml(event.description)}</div>
            ${tags ? `<div class="tag-row">${tags}</div>` : ''}
            ${expanded ? renderActionButtons(day, event) : ''}
          </article>
        `;
      }

      function renderCalendar(phone) {
        const month = getCurrentMonth();
        const className = phone ? 'calendar phone-calendar' : 'calendar';
        const cells = buildCalendarCells(month);
        const visibleLimit = phone ? 2 : 3;
        return `
          <section class="${className}">
            <div class="calendar-top">
              <div class="section-copy">
                <div class="section-title">${escapeHtml(month.title)}</div>
              </div>
              <div class="calendar-nav">
                <button class="btn" data-action="prev-month" type="button">上个月</button>
                <button class="btn" data-action="reset-month" type="button">本月</button>
                <button class="btn" data-action="next-month" type="button">下个月</button>
              </div>
            </div>
            <div class="weekdays">
              ${WEEKDAYS.map(day => `<div class="weekday">${day}</div>`).join('')}
            </div>
            <div class="grid">
              ${cells
                .map(cell => {
                  const visibleEvents = cell.events
                    .slice(0, visibleLimit)
                    .map(
                      event => `
                        <button
                          class="event ${event.kind}"
                          data-action="pick-event"
                          data-day="${cell.day}"
                          data-event-id="${escapeHtml(event.id)}"
                          type="button"
                        >${escapeHtml(event.title)}</button>
                      `,
                    )
                    .join('');
                  const overflow =
                    cell.events.length > visibleLimit
                      ? `<div class="overflow">+${cell.events.length - visibleLimit}</div>`
                      : '';
                  const action = cell.monthOffset === 0 ? 'pick-day' : 'jump-month-day';
                  return `
                    <article
                      class="day ${cell.muted ? 'muted' : ''} ${cell.monthOffset === 0 && cell.day === state.selectedDay ? 'selected' : ''}"
                      data-action="${action}"
                      data-day="${cell.day}"
                      data-offset="${cell.monthOffset}"
                    >
                      <div class="day-head"><span class="day-number">${cell.day}</span></div>
                      <div class="events">${visibleEvents}${overflow}</div>
                    </article>
                  `;
                })
                .join('')}
            </div>
          </section>
        `;
      }

      function renderBooksSection(month, dayData) {
        const bookIds = collectDayBookIds(month, dayData);
        const books = bookIds.map(getBookById).filter(Boolean);
        if (books.length === 0) return '';
        return `
          <section class="card">
            <div class="section-title">相关读物</div>

              ${books

                    <button class="book-button" data-action="open-book" data-book-id="${escapeHtml(book.id)}" type="button">

          </section>

      function renderDetailPanel() {

        const dayData = getSelectedDayData();

        if (state.panel === 'form') {
          const title = state.formMode === 'edit' && selectedEvent ? selectedEvent.title : '新增事件';

              </div>

        return `
          <section class="card">

                : `<div class="empty-state">这一天还没有事件。</div>`

          ${renderBooksSection(month, dayData)}

      function renderDesktopMonth() {
        const month = getCurrentMonth();
        return `
          <section class="main">
            <div class="main-mode-switch">
              <div class="segmented">
                <button class="${state.view === 'list' ? 'active' : ''}" data-action="view" data-value="list" type="button">列表</button>
                <button class="${state.view === 'month' ? 'active' : ''}" data-action="view" data-value="month" type="button">月历</button>
              </div>

            <div class="status">
              <div>今天：${escapeHtml(month.todayText)}</div>
              <div>目前查看：${escapeHtml(formatDayLabel(month, state.selectedDay))}</div>
            </div>
            ${renderCalendar(false)}

      }

      function renderDesktopList() {
        const month = getCurrentMonth();
        const daysWithEvents = Array.from({ length: month.daysInMonth }, (_, index) => index + 1)
          .map(day => ({ day, data: getDayData(month, day) }))
          .filter(item => item.data.events.length > 0);
        return `
          <section class="main">
            <div class="main-mode-switch">
              <div class="segmented">
                <button class="${state.view === 'list' ? 'active' : ''}" data-action="view" data-value="list" type="button">列表</button>

            <section class="list-board">
              ${daysWithEvents
                .map(

                    <article class="list-day">
                      <div class="list-day-title">${escapeHtml(`${item.day}日 周${getWeekdayLabel(month, item.day)}`)}</div>

              </div>
              <div class="side-body">

              </div>
            </aside>
            <button class="floating-add" data-action="show-form" type="button" aria-label="新增事件">+</button>
          </section>
        `;
      }

      function renderMobile() {
        return `
          <div class="phone-wrap">
            <section class="phone-shell">
              <div class="phone-top">
                ${renderCalendar(true)}
              </div>
              <div class="phone-bottom">
                ${renderDetailPanel()}
              </div>
              <button class="floating-add" data-action="show-form" type="button" aria-label="新增事件">+</button>
            </section>
          </div>
        `;
      }

      function renderReader() {
        if (!state.readerBookId) return '';
        const book = getBookById(state.readerBookId);
        if (!book) return '';
        return `
          <div class="reader-overlay" data-action="close-book-overlay">
            <section class="reader-modal" data-action="book-modal">
              <div class="reader-head">
                <div class="section-copy">
                  <div class="section-title">${escapeHtml(book.title)}</div>
                  <div class="section-subtitle">${escapeHtml(book.summary)}</div>
                </div>
                <button class="btn" data-action="close-book" type="button">关闭</button>
              </div>
              <div class="reader-body">${escapeHtml(book.body)}</div>
            </section>
          </div>
        `;
      }

      function render() {
        app.innerHTML = `
          <main class="page">
            <section class="toolbar">
              <div class="toolbar-actions">
                <div class="segmented">
                  <button class="${state.viewport === 'desktop' ? 'active' : ''}" data-action="viewport" data-value="desktop" type="button">Desktop</button>
                  <button class="${state.viewport === 'mobile' ? 'active' : ''}" data-action="viewport" data-value="mobile" type="button">Mobile</button>
                </div>
              </div>
            </section>
            ${state.viewport === 'desktop' ? renderDesktop() : renderMobile()}
          </main>
          ${renderReader()}
        `;
      }

      app.addEventListener('click', event => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const actionTarget = target.closest('[data-action]');
        if (!(actionTarget instanceof HTMLElement)) return;

        const action = actionTarget.dataset.action;
        const day = Number(actionTarget.dataset.day || '0');
        const eventId = actionTarget.dataset.eventId || '';
        const value = actionTarget.dataset.value || '';
        const offset = Number(actionTarget.dataset.offset || '0');
        const bookId = actionTarget.dataset.bookId || '';

        if (action === 'book-modal') {
          return;
        }

        if (action === 'viewport') {
          state.viewport = value === 'mobile' ? 'mobile' : 'desktop';
          render();
          return;
        }

        if (action === 'view') {
          state.view = value === 'list' ? 'list' : 'month';
          render();
          return;
        }

        if (action === 'show-form') {
          openCreateForm();
          render();
          return;
        }

        if (action === 'show-detail' || action === 'finish-form') {
          state.panel = 'detail';
          state.formMode = 'create';
          render();
          return;
        }

        if (action === 'pick-day') {
          selectDay(day);
          render();
          return;
        }

        if (action === 'jump-month-day') {
          jumpMonth(offset, day);
          render();
          return;
        }

        if (action === 'pick-event') {
          selectEvent(day, eventId);
          render();
          return;
        }

        if (action === 'pick-event-card') {
          if (state.actionMenuEventId === eventId) {
            state.actionMenuEventId = null;
            state.selectedEventId = eventId;
            state.selectedDay = day;
          } else {
            selectEvent(day, eventId);
          }
          state.panel = 'detail';
          render();
          return;
        }

        if (action === 'edit-event') {
          openEditForm(day, eventId);
          render();
          return;
        }

        if (action === 'toggle-archive') {
          selectEvent(day, eventId);
          toggleArchive(day, eventId);
          render();
          return;
        }

        if (action === 'delete-event') {
          deleteEvent(day, eventId);
          render();
          return;
        }

        if (action === 'prev-month') {
          jumpMonth(-1);
          render();
          return;
        }

        if (action === 'next-month') {
          jumpMonth(1);
          render();
          return;
        }

        if (action === 'reset-month') {
          resetCurrentMonth();
          render();
          return;
        }

        if (action === 'open-book') {
          state.readerBookId = bookId;
          render();
          return;
        }

        if (action === 'close-book' || action === 'close-book-overlay') {
          state.readerBookId = null;
          render();
        }
      });

      app.addEventListener('keydown', event => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        if (event.key !== 'Enter' && event.key !== ' ') return;
        const actionTarget = target.closest('[data-action="pick-event-card"]');
        if (!(actionTarget instanceof HTMLElement)) return;
        event.preventDefault();
        const day = Number(actionTarget.dataset.day || '0');
        const eventId = actionTarget.dataset.eventId || '';
        if (state.actionMenuEventId === eventId) {
          state.actionMenuEventId = null;
          state.selectedEventId = eventId;
          state.selectedDay = day;
        } else {
          selectEvent(day, eventId);
        }
        render();
      });

      render();
    </script>
  </body>
</html>
