        摘要内容: "复兴纪元214年，索伦蒂斯三大贸易财阀因诺斯加德联盟远洋航线几欲开战，赛瑞利亚原生种人鱼领主塞壬以海妖之歌平息内战。财阀贪恋其“美”，以战争威胁\
          胁迫她参加女神选美大赛四年。第五年塞壬识破骗局，留下海螺退赛。民众暴动后，深蓝议会为平息风波，将她永久移出常规评选并加冕为【至高的阿芙罗黛\
          蒂】，使其成为不可逾越的神话。"
